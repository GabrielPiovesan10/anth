<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de Relatório de Turno</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* Estilos básicos para o ecrã do telemóvel */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #0056b3;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        input[type="file"] {
            margin-top: 5px;
        }
        .btn-salvar {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-salvar:hover {
            background-color: #218838;
        }
        /* Grid para exibir as fotos carregadas */
        #galeria-fotos {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        .foto-container {
            width: calc(50% - 5px); /* Duas fotos por linha no PDF */
        }
        .foto-container img {
            width: 100%;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        
        /* Área que será exportada para o PDF */
        #area-pdf {
            padding: 10px;
            background: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="area-pdf">
            <h1>Relatório de Turno - Operação (ETA)</h1>

            <div class="form-group">
                <label for="operador">Nome do Operador:</label>
                <input type="text" id="operador" placeholder="Escreve o teu nome...">
            </div>

            <div class="form-group">
                <label for="data">Data do Turno:</label>
                <input type="date" id="data">
            </div>

            <div class="form-group">
                <label for="observacoes">Ocorrências e Anotações do Turno:</label>
                <textarea id="observacoes" placeholder="Descreve os níveis, dosagens de produtos químicos, e ocorrências..."></textarea>
            </div>

            <div class="form-group" id="area-upload" data-html2canvas-ignore="true">
                <label for="input-fotos">Anexar Fotos (Equipamentos, Painéis, etc):</label>
                <input type="file" id="input-fotos" accept="image/*" multiple onchange="carregarFotos(event)">
            </div>

            <div id="galeria-fotos"></div>
        </div>

        <button class="btn-salvar" onclick="gerarPDF()">💾 Salvar Turno (Descarregar PDF)</button>
    </div>

    <script>
        // Função para mostrar as fotos no ecrã assim que são escolhidas
        function carregarFotos(event) {
            const galeria = document.getElementById('galeria-fotos');
            galeria.innerHTML = ''; // Limpa fotos anteriores
            
            const arquivos = event.target.files;
            
            for (let i = 0; i < arquivos.length; i++) {
                const arquivo = arquivos[i];
                const leitor = new FileReader();
                
                leitor.onload = function(e) {
                    const div = document.createElement('div');
                    div.className = 'foto-container';
                    
                    const img = document.createElement('img');
                    img.src = e.target.result; // Converte para Base64 para mostrar no ecrã
                    
                    div.appendChild(img);
                    galeria.appendChild(div);
                }
                
                leitor.readAsDataURL(arquivo);
            }
        }

        // Função que aciona a biblioteca html2pdf e descarrega o ficheiro no telemóvel
        function gerarPDF() {
            // Pega no conteúdo da área que queremos transformar em PDF
            const elemento = document.getElementById('area-pdf');
            
            // Pega na data de hoje para nomear o ficheiro
            const dataHoje = new Date().toLocaleDateString('pt-PT').replace(/\//g, '-');
            const nomeArquivo = 'Relatorio_Turno_' + dataHoje + '.pdf';

            // Configurações do PDF
            const opt = {
                margin:       10,
                filename:     nomeArquivo,
                image:        { type: 'jpeg', quality: 0.95 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Gera e descarrega
            html2pdf().set(opt).from(elemento).save();
        }
    </script>
</body>
</html>
