<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Operacional de Turno</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #0f766e;
            border-bottom: 2px solid #0f766e;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #1e293b;
        }
        input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        .btn-salvar {
            width: 100%;
            padding: 15px;
            background-color: #0f766e;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
        .btn-salvar:hover {
            background-color: #115e59;
        }
        #galeria-fotos {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        .foto-container {
            width: calc(50% - 5px);
        }
        .foto-container img {
            width: 100%;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        
        /* A mágica do CSS: O que acontece na hora de gerar o PDF */
        @media print {
            body {
                background-color: white;
                padding: 0;
            }
            .container {
                box-shadow: none;
                max-width: 100%;
                padding: 0;
            }
            /* Esconde os botões e a área de selecionar arquivo do PDF final */
            .no-print {
                display: none !important;
            }
            /* Remove as bordas dos campos para parecer um documento de texto limpo */
            input[type="text"], input[type="date"], textarea {
                border: none;
                padding: 0;
                background: transparent;
                resize: none;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Relatório de Turno - ETA</h1>

        <div class="form-group">
            <label>Nome do Operador:</label>
            <input type="text" placeholder="Digite seu nome...">
        </div>

        <div class="form-group">
            <label>Data do Turno:</label>
            <input type="date">
        </div>

        <div class="form-group">
            <label>Ocorrências (Dosagens, Níveis, Parâmetros):</label>
            <textarea placeholder="Descreva aqui os detalhes da operação, manutenções ou anomalias..."></textarea>
        </div>

        <div class="form-group no-print">
            <label>Anexar Fotos (Equipamentos/Painéis):</label>
            <input type="file" accept="image/*" multiple onchange="carregarFotos(event)">
        </div>

        <div id="galeria-fotos"></div>

        <button class="btn-salvar no-print" onclick="window.print()">💾 Salvar como PDF</button>
    </div>

    <script>
        function carregarFotos(event) {
            const galeria = document.getElementById('galeria-fotos');
            
            // Só limpa se for selecionar novas fotos do zero, senão vai acumulando
            // galeria.innerHTML = ''; 
            
            const arquivos = event.target.files;
            
            for (let i = 0; i < arquivos.length; i++) {
                const leitor = new FileReader();
                leitor.onload = function(e) {
                    const div = document.createElement('div');
                    div.className = 'foto-container';
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    div.appendChild(img);
                    galeria.appendChild(div);
                }
                leitor.readAsDataURL(arquivos[i]);
            }
        }
    </script>
</body>
</html>
