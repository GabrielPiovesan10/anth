<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Operacional ETA</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 20px; color: #334155; }
        #tela-sistema { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; }
        .btn-salvar { width: 100%; padding: 15px; background-color: #0f766e; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* Oculta o relatório de PDF na tela */
        #relatorio-para-pdf { display: none; }

        @media print {
            body { background: white; padding: 0; }
            #tela-sistema { display: none !important; }
            #relatorio-para-pdf { display: block !important; padding: 10mm; }
            
            .bloco-pdf { page-break-inside: avoid; break-inside: avoid; margin-bottom: 15px; }
            .foto-pdf { width: 45%; display: inline-block; vertical-align: top; margin: 5px; }
            .foto-pdf img { width: 100%; border: 1px solid #ccc; }
            h3 { border-bottom: 1px solid #000; }
        }
    </style>
</head>
<body>

    <div id="tela-sistema">
        <h1>Relatório de Turno</h1>
        <div class="form-group"><label>Operador:</label><input type="text" id="input-nome"></div>
        <div class="form-group"><label>Data:</label><input type="date" id="input-data"></div>
        
        <div class="form-group">
            <label>Checklist:</label>
            <div id="container-check">
                <label><input type="checkbox" class="check-item" value="Bombas Ok"> Bombas Ok</label><br>
                <label><input type="checkbox" class="check-item" value="Decantador Ok"> Decantador Ok</label><br>
                <label><input type="checkbox" class="check-item" value="Filtros Ok"> Filtros Ok</label><br>
            </div>
        </div>

        <div class="form-group"><label>Anotações:</label><textarea id="input-texto"></textarea></div>
        <div class="form-group"><label>Fotos:</label><input type="file" id="input-fotos" multiple onchange="carregarFotos(event)"></div>
        <button class="btn-salvar" onclick="gerarPDF()">💾 Salvar PDF</button>
    </div>

    <div id="relatorio-para-pdf">
        <h2>Relatório de Operação</h2>
        <p><strong>Data:</strong> <span id="doc-data"></span> | <strong>Hora:</strong> <span id="doc-hora"></span></p>
        <p><strong>Operador:</strong> <span id="doc-nome"></span></p>
        
        <h3>Checklist:</h3>
        <ul id="doc-checklist"></ul>
        
        <h3>Ocorrências:</h3>
        <p id="doc-texto"></p>
        
        <h3>Fotos:</h3>
        <div id="doc-fotos"></div>
    </div>

    <script>
        let fotos = [];
        function carregarFotos(e) {
            fotos = [];
            for (let f of e.target.files) {
                let reader = new FileReader();
                reader.onload = (ev) => fotos.push(ev.target.result);
                reader.readAsDataURL(f);
            }
        }

        function gerarPDF() {
            document.getElementById('doc-nome').innerText = document.getElementById('input-nome').value;
            document.getElementById('doc-data').innerText = document.getElementById('input-data').value;
            document.getElementById('doc-hora').innerText = new Date().toLocaleTimeString('pt-BR');
            document.getElementById('doc-texto').innerText = document.getElementById('input-texto').value;
            
            let list = document.getElementById('doc-checklist');
            list.innerHTML = '';
            document.querySelectorAll('.check-item').forEach(i => {
                let li = document.createElement('li');
                li.innerText = (i.checked ? "[ X ] " : "[   ] ") + i.value;
                list.appendChild(li);
            });

            let containerFotos = document.getElementById('doc-fotos');
            containerFotos.innerHTML = '';
            fotos.forEach(f => {
                let div = document.createElement('div');
                div.className = 'foto-pdf';
                div.innerHTML = `<img src="${f}">`;
                containerFotos.appendChild(div);
            });

            setTimeout(() => window.print(), 500);
        }
    </script>
</body>
</html>
